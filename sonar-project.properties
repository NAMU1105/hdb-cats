# ---------------------------------------------------------------
# SonarCloud project configuration
# https://sonarcloud.io/project/configuration?id=NAMU1105_hdb-cats
#
# Setup steps:
#   1. Go to sonarcloud.io → Log in with GitHub → Create project
#   2. Copy the generated projectKey and organization values below
#   3. Add SONAR_TOKEN to GitHub Secrets
# ---------------------------------------------------------------

sonar.projectKey=NAMU1105_hdb-cats
sonar.organization=namu1105
sonar.projectName=HDB Cats

# Source & test paths (relative to repo root)
sonar.sources=frontend/src,backend/src
sonar.tests=frontend/src/__tests__,backend/src/__tests__,e2e/tests
sonar.test.inclusions=**/__tests__/**/*,**/e2e/tests/**/*

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/build/**

# Coverage — generated by `vitest run --coverage` in CI
sonar.javascript.lcov.reportPaths=\
  backend/coverage/lcov.info,\
  frontend/coverage/lcov.info
