name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to roll back'
        required: true
        type: choice
        options: [uat, prod]
      git_sha:
        description: 'Git SHA to roll back to (e.g. abc1234). Find it in the Actions deploy history.'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  rollback-backend:
    name: Rollback backend → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout target SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build --workspace=backend

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Redeploy Lambda functions from ${{ inputs.git_sha }}
        working-directory: backend/dist
        run: |
          for handler in getCats getCat createCat getUploadUrl deleteCat updateCat toggleLike addCatPhoto getMyCats deletePhoto; do
            zip -j ${handler}.zip ${handler}/index.js
            aws lambda update-function-code \
              --function-name hdb-cats-${handler}-${{ inputs.environment }} \
              --zip-file fileb://${handler}.zip \
              --no-cli-pager
          done
          echo "✅ Backend rolled back to ${{ inputs.git_sha }}"

  rollback-frontend:
    name: Rollback frontend → ${{ inputs.environment }}
    needs: rollback-backend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout target SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build frontend from ${{ inputs.git_sha }}
        run: npm run build --workspace=frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CLOUDFRONT_DOMAIN: ${{ secrets.VITE_CLOUDFRONT_DOMAIN }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Sync rolled-back build to S3
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ secrets.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --no-cli-pager
          echo "✅ Frontend rolled back to ${{ inputs.git_sha }}"
