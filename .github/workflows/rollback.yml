name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to roll back (uat and prod share the same main branch — this is for documentation only)'
        required: true
        type: choice
        options: [uat, prod]
      git_sha:
        description: 'Roll back TO this commit SHA (all commits after this will be reverted)'
        required: true
        type: string

permissions:
  contents: write  # needed to push the revert commit

jobs:
  revert:
    name: Revert main to ${{ inputs.git_sha }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          # Use a PAT or the default GITHUB_TOKEN with write permission
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate target SHA exists
        run: |
          git cat-file -e ${{ inputs.git_sha }}^{commit} \
            || (echo "❌ SHA ${{ inputs.git_sha }} not found" && exit 1)

      - name: Revert all commits after target SHA
        run: |
          # Revert every commit between target SHA (exclusive) and HEAD (inclusive),
          # newest first, without creating individual commits per revert.
          git revert --no-commit ${{ inputs.git_sha }}..HEAD

      - name: Commit and push revert
        run: |
          git commit -m "revert: roll back to ${{ inputs.git_sha }} (${{ inputs.environment }})

          Reverts all commits after ${{ inputs.git_sha }}.
          Triggered manually via rollback workflow."
          git push origin main
          echo "✅ Revert commit pushed — deploy workflow will handle the rest"
