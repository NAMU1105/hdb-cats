name: Deploy

on:
  push:
    branches: [develop, main]

# Required for OIDC token exchange with AWS
permissions:
  id-token: write
  contents: read

jobs:
  # ── GATE: unit tests must pass before any deployment ───────────────────────

  test:
    name: Unit tests (gate)
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run typecheck --workspace=backend
      - run: npm run test --workspace=backend
      - run: npm run typecheck --workspace=frontend
      - run: npm run test --workspace=frontend

  # ── DEV (push to develop) ───────────────────────────────────────────────────

  deploy-dev-backend:
    name: Deploy backend → dev
    if: github.ref == 'refs/heads/develop'
    needs: [test]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build --workspace=backend

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Update Lambda functions
        working-directory: backend/dist
        run: |
          for handler in getCats getCat createCat getUploadUrl deleteCat updateCat toggleLike addCatPhoto getMyCats deletePhoto; do
            zip -j ${handler}.zip ${handler}/index.js
            aws lambda update-function-code \
              --function-name hdb-cats-${handler}-dev \
              --zip-file fileb://${handler}.zip \
              --no-cli-pager
          done

  # ── UAT (push to main) ──────────────────────────────────────────────────────

  deploy-uat-backend:
    name: Deploy backend → uat
    if: github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build --workspace=backend

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Update Lambda functions
        working-directory: backend/dist
        run: |
          for handler in getCats getCat createCat getUploadUrl deleteCat updateCat toggleLike addCatPhoto getMyCats deletePhoto; do
            zip -j ${handler}.zip ${handler}/index.js
            aws lambda update-function-code \
              --function-name hdb-cats-${handler}-uat \
              --zip-file fileb://${handler}.zip \
              --no-cli-pager
          done

  deploy-uat-frontend:
    name: Deploy frontend → uat
    if: github.ref == 'refs/heads/main'
    needs: deploy-uat-backend
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build --workspace=frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CLOUDFRONT_DOMAIN: ${{ secrets.VITE_CLOUDFRONT_DOMAIN }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ secrets.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --no-cli-pager

  # ── E2E against UAT — must pass before prod is unlocked ────────────────────

  e2e-uat:
    name: E2E tests → uat
    if: github.ref == 'refs/heads/main'
    needs: deploy-uat-frontend
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against UAT
        run: npm run test:e2e
        env:
          # Point Playwright at the live UAT deployment — no dev server is started
          BASE_URL: ${{ secrets.UAT_BASE_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-uat
          path: playwright-report/
          retention-days: 7

  # ── PROD (push to main → after UAT E2E → manual approval) ──────────────────

  deploy-prod-backend:
    name: Deploy backend → prod
    if: github.ref == 'refs/heads/main'
    needs: e2e-uat
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build --workspace=backend

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Update Lambda functions
        working-directory: backend/dist
        run: |
          for handler in getCats getCat createCat getUploadUrl deleteCat updateCat toggleLike addCatPhoto getMyCats deletePhoto; do
            zip -j ${handler}.zip ${handler}/index.js
            aws lambda update-function-code \
              --function-name hdb-cats-${handler}-prod \
              --zip-file fileb://${handler}.zip \
              --no-cli-pager
          done

  deploy-prod-frontend:
    name: Deploy frontend → prod
    if: github.ref == 'refs/heads/main'
    needs: deploy-prod-backend
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build --workspace=frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CLOUDFRONT_DOMAIN: ${{ secrets.VITE_CLOUDFRONT_DOMAIN }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ secrets.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --no-cli-pager
