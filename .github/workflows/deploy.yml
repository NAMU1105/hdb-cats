name: Deploy

on:
  push:
    branches: [main]

# These permissions are required for OIDC token exchange with AWS.
# No long-lived AWS credentials are stored in GitHub Secrets.
permissions:
  id-token: write  # allows requesting the OIDC JWT
  contents: read

jobs:
  deploy-backend:
    name: Build & deploy Lambda functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend

      - run: npm run build
        working-directory: backend

      # Exchange the GitHub OIDC token for short-lived AWS credentials.
      # No AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY needed.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Upload Lambda bundles
        working-directory: backend/dist
        run: |
          for handler in getCats getCat createCat getUploadUrl deleteCat; do
            zip -j ${handler}.zip ${handler}/index.js
            aws lambda update-function-code \
              --function-name hdb-cats-${handler}-prod \
              --zip-file fileb://${handler}.zip \
              --no-cli-pager
          done

  deploy-frontend:
    name: Build & deploy frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CLOUDFRONT_DOMAIN: ${{ secrets.VITE_CLOUDFRONT_DOMAIN }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html must never be cached — browsers need the latest entry point
          aws s3 cp frontend/dist/index.html s3://${{ secrets.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --no-cli-pager
